# Production deployment: the Go gateway (internal) behind a Caddy reverse proxy
# that terminates TLS with an automatic Let's Encrypt certificate.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Rendering is in-process (no zrenderer container). Only Caddy is published to the
# host (80/443); the gateway is reachable only on the internal network as
# `gateway:8080`. Point your domain's A record at this host's public IP before
# starting, so Let's Encrypt can validate.

services:
  gateway:
    build: ./gateway
    environment:
      RESOURCE_DIR: "/resources"
      ICONS_DIR: "/icons"
      GATEWAY_PORT: "8080"
    volumes:
      - ./resources:/resources:ro
      - ./resources/icons:/icons:ro   # static icons from extract-grf.mjs --icons (optional)
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - gateway
    ports:
      - "80:80"     # ACME HTTP-01 challenge + http→https redirect
      - "443:443"   # public HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # persists issued certificates
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
