# Production deployment: zrenderer + gateway (internal) behind a Caddy reverse
# proxy that terminates TLS with an automatic Let's Encrypt certificate.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Only Caddy is published to the host (80/443). The gateway is reachable only on
# the internal network as `gateway:8080`. Point your domain's A record at this
# host's public IP before starting, so Let's Encrypt can validate.

services:
  zrenderer:
    image: zhade/zrenderer:latest
    user: root
    volumes:
      - ./zrenderer.docker.conf:/zren/zrenderer.conf
      - ./resources:/zren/resources
      - zren-output:/zren/output
      - zren-secrets:/zren/secrets
    expose:
      - "11011"
    restart: unless-stopped

  gateway:
    build: ./gateway
    depends_on:
      - zrenderer
    environment:
      ZRENDERER_URL: "http://zrenderer:11011"
      TOKEN_FILE: "/secrets/accesstokens.conf"
      OUTPUT_DIR: "/zren/output"
      CACHE_DIR: "/cache"
      GATEWAY_PORT: "8080"
    volumes:
      - zren-output:/zren/output:ro
      - zren-secrets:/secrets:ro
      - gateway-cache:/cache
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - gateway
    ports:
      - "80:80"     # ACME HTTP-01 challenge + http→https redirect
      - "443:443"   # public HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # persists issued certificates
      - caddy-config:/config
    restart: unless-stopped

volumes:
  zren-output:
  zren-secrets:
  gateway-cache:
  caddy-data:
  caddy-config:
