# zrenderer server configuration (consumed by the official zhade/zrenderer image).
# Paths are relative to the container WORKDIR (/zren).

# Where rendered sprites are written. Shared with the gateway as a read-only volume.
outdir=output

# Extracted Ragnarok Online assets (data/sprite, data/palette, ...). You must
# populate ./resources yourself from your own GRF — see the README.
resourcepath=resources

# Deterministic, checksum-based output filenames so identical render requests
# always resolve to the same file. Combined with returnExistingFiles this gives
# zrenderer its own render cache underneath the gateway's cache.
enableUniqueFilenames=true
returnExistingFiles=true

[server]
# Listen on all interfaces inside the container. Only the gateway can reach this
# (the service is not published to the host in docker-compose.yml).
hosts=0.0.0.0
port=11011

# An access token is auto-generated here on first run and printed to the logs.
# The gateway reads this same file (shared volume) to authenticate.
tokenfile=secrets/accesstokens.conf
